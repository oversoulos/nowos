<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowos Foundation</title>
    <link rel="stylesheet" href="foundation.css">
</head>
<body>
    <!-- ========================================
         BACKGROUND LAYERS
         ======================================== -->
    <div class="bg-layer bg-far" id="bg-far"></div>
    <div class="bg-layer bg-mid" id="bg-mid"></div>
    <div class="bg-layer bg-near" id="bg-near"></div>

    <!-- ========================================
         CARD SYSTEM
         ======================================== -->
    <div id="card-container">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="card-content">
                    <div class="coord" id="coord">0, 0</div>
                    <div class="label">NOWOS</div>
                </div>
            </div>
            <div class="card-face card-back">
                <div class="card-content">
                    <div class="coord">EDIT</div>
                    <div class="label">CARD BACK</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========================================
         SOCKET SYSTEM
         Empty containers for plug-in components
         ======================================== -->
    <div id="socket-profile" class="socket">
        <div class="socket-label">PROFILE</div>
    </div>

    <div id="socket-settings" class="socket">
        <div class="socket-label">SETTINGS</div>
    </div>

    <div id="socket-tools" class="socket">
        <div class="socket-label">TOOLS</div>
    </div>

    <div id="socket-flip" class="socket">
        <div class="socket-label">FLIP</div>
    </div>

    <!-- ========================================
         INFO PANEL
         ======================================== -->
    <div id="info">
        <div>Position: <span id="pos">0, 0</span> | Size: <span id="size">Small</span></div>
        <div>Arrow keys / Swipe to navigate | Space to flip</div>
    </div>

    <!-- ========================================
         FOUNDATION JAVASCRIPT
         Core navigation + socket system
         ======================================== -->
    <script src="foundation.js"></script>
</body>
</html>
