<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nowos — card sandbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #03030a;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== BACKGROUND LAYERS ========== */
        #bg-planet {
            position: fixed;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            z-index: 1;
            background: radial-gradient(ellipse 145% 50% at 50% 116%,
    #0e1530 0%,  /* top color */
    #090d24 28%,
    #06071a 60%,
    #03030a 100%);
            pointer-events: none;
            transition: transform 1.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #bg-haze {
            position: fixed;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            z-index: 3;
            background: radial-gradient(ellipse 105% 22% at 50% 105%,
                rgba(24, 48, 130, 0.14) 0%,
                transparent 74%);
            pointer-events: none;
            mix-blend-mode: screen;
        }

        #sky {
            position: fixed;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* ========== CARD ========== */
        #card-container {
            position: relative;
            z-index: 100;
            perspective: 1400px;
        }

        #zoom-wrap {
            transform: scale(0.95);
            transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #zoom-wrap.traveling {
            transform: scale(0.75);
        }

        .card {
            position: relative;
            width: 280px;
            height: 392px;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: transform 0.88s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 24px;
            overflow: hidden;
            padding: 28px;
            background: #101622;
            box-shadow: 0 0 0 1.5px rgba(100, 200, 255, 0.55), 
                        0 0 0 1.5px rgba(100, 200, 255, 0.55),
                        0 0 18px 4px rgba(100, 200, 255, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .card-front {
            background: linear-gradient(135deg, #101622 0%, #0a0e18 100%);
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #080a14 0%, #05060c 100%);
        }

        .card-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .card-coord {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: rgba(255, 255, 255, 0.88);
            text-shadow: 0 0 20px #5abeff;
        }

        .card-label {
            font-size: 9px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.38);
        }

        .card-node {
            position: absolute;
            bottom: 16px;
            right: 16px;
            font-size: 8px;
            color: rgba(255, 255, 255, 0.14);
            letter-spacing: 1px;
        }

        /* ========== SLIDE ANIMATIONS ========== */
        .card.out-l { animation: slideOutLeft 0.42s cubic-bezier(0.55,0,1,0.8) forwards; }
        .card.out-r { animation: slideOutRight 0.42s cubic-bezier(0.55,0,1,0.8) forwards; }
        .card.out-u { animation: slideOutUp 0.42s cubic-bezier(0.55,0,1,0.8) forwards; }
        .card.out-d { animation: slideOutDown 0.42s cubic-bezier(0.55,0,1,0.8) forwards; }
        .card.in-l  { animation: slideInLeft 0.42s cubic-bezier(0,0.2,0.3,1) forwards; }
        .card.in-r  { animation: slideInRight 0.42s cubic-bezier(0,0.2,0.3,1) forwards; }
        .card.in-u  { animation: slideInUp 0.42s cubic-bezier(0,0.2,0.3,1) forwards; }
        .card.in-d  { animation: slideInDown 0.42s cubic-bezier(0,0.2,0.3,1) forwards; }

        @keyframes slideOutLeft { to { transform: translateX(-200vw); opacity: 0; } }
        @keyframes slideOutRight { to { transform: translateX(200vw); opacity: 0; } }
        @keyframes slideOutUp { to { transform: translateY(-200vh) scale(0.7); opacity: 0; } }
        @keyframes slideOutDown { to { transform: translateY(200vh) scale(1.12); opacity: 0; } }
        @keyframes slideInLeft { from { transform: translateX(-200vw); opacity: 0; } to { transform: none; opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(200vw); opacity: 0; } to { transform: none; opacity: 1; } }
        @keyframes slideInUp { from { transform: translateY(-200vh) scale(0.7); opacity: 0; } to { transform: none; opacity: 1; } }
        @keyframes slideInDown { from { transform: translateY(200vh) scale(1.12); opacity: 0; } to { transform: none; opacity: 1; } }

        /* ========== SOCKETS ========== */
        .socket {
            position: fixed;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px dashed rgba(255, 255, 255, 0.12);
            z-index: 1000;
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }

        .socket:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: #5abeff;
            transform: scale(1.1);
        }

        .socket-icon { font-size: 16px; color: rgba(255, 255, 255, 0.38); }
        .socket-lbl { font-size: 6px; color: rgba(255, 255, 255, 0.14); letter-spacing: 1px; }

        #s-profile { top: 22px; left: 22px; }
        #s-settings { top: 22px; right: 22px; }
        #s-tools { bottom: 22px; left: 22px; }
        #s-flip { bottom: 22px; right: 22px; }

        /* ========== HUD ========== */
        #hud {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            color: rgba(255, 255, 255, 0.14);
            font-size: 9px;
            letter-spacing: 1.4px;
            pointer-events: none;
            white-space: nowrap;
        }

        #hud b { color: #5abeff; font-weight: 400; }
    </style>
</head>
<body>

    <div id="bg-planet"></div>
    <div id="bg-haze"></div>
    <div id="sky"></div>

    <div id="card-container">
        <div id="zoom-wrap">
            <div class="card" id="card">
                <div class="card-face card-front">
                    <div class="card-content">
                        <div class="card-coord" id="coord">0, 0</div>
                        <div class="card-label">NOWOS</div>
                    </div>
                    <div class="card-node" id="card-node">NODE · 0000</div>
                </div>
                <div class="card-face card-back">
                    <div class="card-content">
                        <div class="card-coord" style="font-size:15px;letter-spacing:2px;">⚙</div>
                        <div class="card-label">FLIP TO FRONT</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="socket" id="s-profile"><div class="socket-icon">◉</div><div class="socket-lbl">Profile</div></div>
    <div class="socket" id="s-settings"><div class="socket-icon">⚙</div><div class="socket-lbl">Settings</div></div>
    <div class="socket" id="s-tools"><div class="socket-icon">⬡</div><div class="socket-lbl">Tools</div></div>
    <div class="socket" id="s-flip"><div class="socket-icon">↺</div><div class="socket-lbl">Flip</div></div>

    <div id="hud">POS <b id="hud-pos">0, 0</b></div>

    <script>
        // NOWOS — complete working version
        const S = {
            x: 0, y: 0,
            nav: false,
            state: 'zoomed',
            idleT: null
        };

        const card = document.getElementById('card');
        const zoomWrap = document.getElementById('zoom-wrap');
        const coord = document.getElementById('coord');
        const cardNode = document.getElementById('card-node');
        const hudPos = document.getElementById('hud-pos');
        const bgPlanet = document.getElementById('bg-planet');
        const bgHaze = document.getElementById('bg-haze');

        function setZoom(state) {
            S.state = state;
            if (state === 'zoomed') zoomWrap.classList.remove('traveling');
            else if (state === 'traveling') zoomWrap.classList.add('traveling');
        }

        function startIdle() {
            clearTimeout(S.idleT);
            S.idleT = setTimeout(() => {
                if (!S.nav && !card.classList.contains('flipped')) setZoom('zoomed');
            }, 10000);
        }

        function hex4(x, y) {
            return (((x & 0xFF) << 8) | (y & 0xFF)).toString(16).toUpperCase().padStart(4, '0');
        }

        function updateDisplay() {
            coord.textContent = `${S.x}, ${S.y}`;
            cardNode.textContent = `NODE · ${hex4(S.x, S.y)}`;
            hudPos.textContent = `${S.x}, ${S.y}`;
            updateBackground();
        }

        function updateBackground() {
            const bx = S.x * 12;
            const by = S.y * 12;
            bgPlanet.style.transform = `translate(${-bx}px, ${-by}px) scale(1)`;
            bgHaze.style.transform = `translate(${-bx * 0.6}px, ${-by * 0.6}px)`;
        }

        function navigate(dx, dy) {
            if (S.nav) return;
            if (card.classList.contains('flipped')) return;

            S.nav = true;
            clearTimeout(S.idleT);
            setZoom('traveling');

            const nx = dx;
            const ny = dy;
            const spd = 420;

            const outClass = nx > 0 ? 'out-l' : nx < 0 ? 'out-r' : ny < 0 ? 'out-u' : 'out-d';
            const inClass = nx > 0 ? 'in-r' : nx < 0 ? 'in-l' : ny < 0 ? 'in-d' : 'in-u';

            card.classList.add(outClass);

            setTimeout(() => {
                S.x += nx;
                S.y += ny;
                updateDisplay();

                card.classList.remove(outClass);
                card.classList.add(inClass);

                setTimeout(() => {
                    card.classList.remove(inClass);
                    S.nav = false;
                    startIdle();
                }, spd);
            }, spd);
        }

        function flip() {
            if (S.nav) return;
            card.classList.toggle('flipped');
            if (card.classList.contains('flipped')) {
                clearTimeout(S.idleT);
            } else {
                startIdle();
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const map = {
                ArrowLeft: () => navigate(-1, 0),
                ArrowRight: () => navigate(1, 0),
                ArrowUp: () => navigate(0, -1),
                ArrowDown: () => navigate(0, 1),
                ' ': () => flip(),
                'f': () => flip(),
                'F': () => flip()
            };
            if (map[e.key]) {
                e.preventDefault();
                map[e.key]();
            }
        });

        // Touch swipe
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].screenX - touchStartX;
            const dy = e.changedTouches[0].screenY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
                navigate(dx > 0 ? -1 : 1, 0);
            } else if (Math.abs(dy) > 40) {
                navigate(0, dy > 0 ? 1 : -1);
            }
        }, { passive: true });

        // Click/tap on card
        card.addEventListener('click', () => {
            if (S.nav) return;
            if (S.state !== 'zoomed') {
                clearTimeout(S.idleT);
                setZoom('zoomed');
            } else {
                flip();
            }
        });

        // Socket buttons
        document.getElementById('s-flip').addEventListener('click', flip);
        document.getElementById('s-settings').addEventListener('click', () => {
            alert('Settings panel — coming soon');
        });
        document.getElementById('s-profile').addEventListener('click', () => {
            alert('Profile panel — coming soon');
        });
        document.getElementById('s-tools').addEventListener('click', () => {
            alert('Tools panel — coming soon');
        });

        // Initialize
        updateDisplay();
        startIdle();
    </script>
</body>
</html>
