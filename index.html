<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="foundation.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nowos</title>
</head>
<body>

<div class="world">

    <canvas id="star-canvas"></canvas>

    <div class="bg" id="bg-planet"></div>
    <canvas id="terrain-canvas"></canvas>
    <div class="bg" id="bg-haze"></div>

    <div id="sky"></div>
    <div id="star"></div>
    <div id="light-shadow"></div>

    <div id="card-container">
        <div id="zoom-wrap" class="zoomed">

            <div class="card" id="card">

                <!-- REQUIRED: 3D slab edges -->
                <div class="edge edge-left"></div>
                <div class="edge edge-right"></div>
                <div class="edge edge-top"></div>
                <div class="edge edge-bottom"></div>

                <div class="card-face card-front">
                    <div class="card-skin"></div>
                    <div class="card-glass"></div>
                    <div class="card-shine" id="card-shine"></div>
                    <div class="card-content">
                        <div class="card-coord" id="coord">0, 0</div>
                        <div class="card-label">NOWOS</div>
                    </div>
                    <div class="card-node" id="card-node">NODE · 0000</div>
                </div>

                <div class="card-face card-back">
                    <div class="card-glass"></div>
                    <div class="card-content">
                        <div class="card-coord" style="font-size:15px;letter-spacing:2px;">CONFIGURE</div>
                        <div class="card-label" style="margin-top:10px;">Rules · Layout · Type</div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <div class="socket" id="s-profile">
        <div class="socket-icon">◉</div>
        <div class="socket-lbl">Profile</div>
    </div>

</div>

<script src="foundation.js"></script>
</body>
</html>
