<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nowos</title>
     <link rel="stylesheet" href="style.css">   
</head>
<body>

    <div id="bg-planet"></div>
    <div id="bg-haze"></div>
    <div id="sky"></div>

    <div id="card-container">
        <div id="zoom-wrap">
            <div class="card" id="card">
                <div class="card-face card-front">
                    <div class="card-content">
                        <div class="card-coord" id="coord">0, 0</div>
                        <div class="card-label">NOWOS</div>
                    </div>
                    <div class="card-node" id="card-node">NODE · 0000</div>
                </div>
                <div class="card-face card-back">
                    <div class="card-content">
                        <div class="card-coord" style="font-size:15px;letter-spacing:2px;">⚙</div>
                        <div class="card-label">FLIP</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toolbar">
    <div class="tool" id="tool-profile">
        <div class="tool-icon">◉</div>
        <div class="tool-lbl">Profile</div>
    </div>
    <div class="tool" id="tool-settings">
        <div class="tool-icon">⚙</div>
        <div class="tool-lbl">Settings</div>
    </div>
    <div class="tool" id="tool-wallet">
        <div class="tool-icon">💰</div>
        <div class="tool-lbl">Wallet</div>
    </div>
    <div class="tool" id="tool-anon">
        <div class="tool-icon">💡</div>
        <div class="tool-lbl">Anonymous</div>
    </div>
</div>   
    <div id="hud">POS <b id="hud-pos">0, 0</b></div>

    <script src="script.js"></script>
</body>
</html>
