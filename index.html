<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowos Foundation</title>
    <style>
        /* ========================================
           FOUNDATION CSS - CORE SYSTEM
           Edit only when changing base structure
           ======================================== */

        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* ========================================
           BACKGROUND LAYERS
           3-layer parallax system
           ======================================== */

        .bg-layer {
            position: fixed;
            top: -25%;
            left: -25%;
            width: 150%;
            height: 150%;
            will-change: transform;
        }

        /* Far layer - slowest movement */
        .bg-far {
            z-index: 1;
            background: linear-gradient(135deg, #0a0820 0%, #1a1535 50%, #2a3550 100%);
            filter: blur(8px);
            animation: drift 40s infinite alternate ease-in-out;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Mid layer - medium movement */
        .bg-mid {
            z-index: 2;
            background: radial-gradient(circle at 30% 40%, rgba(100, 200, 220, 0.08) 0%, transparent 50%);
            filter: blur(4px);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Near layer - fastest movement */
        .bg-near {
            z-index: 3;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(100, 200, 220, 0.02) 3px,
                rgba(100, 200, 220, 0.02) 6px
            );
            filter: blur(1px);
            opacity: 0.3;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1.05); }
            100% { transform: translate(-3%, 3%) scale(1.08); }
        }

        /* ========================================
           CARD SYSTEM
           Core navigation element
           ======================================== */

        #card-container {
            position: relative;
            z-index: 100;
            transform-style: preserve-3d;
        }

        .card {
            position: relative;
            width: 220px;
            height: 310px;
            transform-style: preserve-3d;
            transition: 
                transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1),
                width 0.6s ease,
                height 0.6s ease;
        }

        /* Focused state (optional auto-zoom) */
        .card.focused {
            width: 450px;
            height: 630px;
        }

        /* Flipped state */
        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Slide animations */
        .card.slide-out-left { animation: slideOutLeft 0.4s forwards; }
        .card.slide-out-right { animation: slideOutRight 0.4s forwards; }
        .card.slide-out-up { animation: slideOutUp 0.4s forwards; }
        .card.slide-out-down { animation: slideOutDown 0.4s forwards; }
        .card.slide-in-left { animation: slideInLeft 0.4s forwards; }
        .card.slide-in-right { animation: slideInRight 0.4s forwards; }
        .card.slide-in-up { animation: slideInUp 0.4s forwards; }
        .card.slide-in-down { animation: slideInDown 0.4s forwards; }

        @keyframes slideOutLeft { to { transform: translateX(-150vw); opacity: 0; } }
        @keyframes slideOutRight { to { transform: translateX(150vw); opacity: 0; } }
        @keyframes slideOutUp { to { transform: translateY(-150vh); opacity: 0; } }
        @keyframes slideOutDown { to { transform: translateY(150vh); opacity: 0; } }
        @keyframes slideInLeft { from { transform: translateX(-150vw); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(150vw); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInUp { from { transform: translateY(-150vh); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInDown { from { transform: translateY(150vh); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Card faces */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 6px;
            background: linear-gradient(145deg, #2a2a2e 0%, #1f1f23 100%);
            box-shadow: 
                0 3px 10px rgba(0, 0, 0, 0.5),
                0 10px 30px rgba(0, 0, 0, 0.4),
                0 30px 70px rgba(0, 0, 0, 0.3),
                0 60px 120px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                inset 0 -1px 0 rgba(0, 0, 0, 0.3);
            padding: 32px;
            overflow: hidden;
        }

        /* Card thickness - left edge */
        .card-face::before {
            content: '';
            position: absolute;
            top: 0;
            left: -5px;
            width: 5px;
            height: 100%;
            background: linear-gradient(to right, rgba(5, 5, 8, 0.95) 0%, rgba(15, 15, 18, 0.8) 40%, rgba(25, 25, 28, 0.5) 70%, transparent 100%);
            box-shadow: inset -1px 0 2px rgba(0, 0, 0, 0.8);
            border-radius: 2px 0 0 2px;
        }

        /* Card thickness - right edge */
        .card-face::after {
            content: '';
            position: absolute;
            top: 0;
            right: -5px;
            width: 5px;
            height: 100%;
            background: linear-gradient(to left, rgba(5, 5, 8, 0.95) 0%, rgba(15, 15, 18, 0.8) 40%, rgba(25, 25, 28, 0.5) 70%, transparent 100%);
            box-shadow: inset 1px 0 2px rgba(0, 0, 0, 0.8);
            border-radius: 0 2px 2px 0;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, #25252a 0%, #1a1a1e 100%);
        }

        .card-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .coord {
            font-size: 48px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 12px;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* ========================================
           SOCKET SYSTEM
           Plug-and-play component containers
           ======================================== */

        .socket {
            position: fixed;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            z-index: 1000;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .socket:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Socket positions (draggable, can be repositioned) */
        #socket-profile { top: 30px; left: 30px; }
        #socket-settings { top: 30px; right: 30px; }
        #socket-tools { bottom: 30px; left: 30px; }
        #socket-flip { bottom: 30px; right: 30px; }

        /* Socket labels (temporary - removed when component loads) */
        .socket-label {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* ========================================
           INFO PANEL
           Development helper (remove in production)
           ======================================== */

        #info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            font-family: monospace;
            z-index: 999;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 16px;
            border-radius: 6px;
            backdrop-filter: blur(10px);
            pointer-events: none;
            text-align: center;
        }

        #info div {
            margin: 3px 0;
        }
    </style>
</head>
<body>
    <!-- ========================================
         BACKGROUND LAYERS
         ======================================== -->
    <div class="bg-layer bg-far" id="bg-far"></div>
    <div class="bg-layer bg-mid" id="bg-mid"></div>
    <div class="bg-layer bg-near" id="bg-near"></div>

    <!-- ========================================
         CARD SYSTEM
         ======================================== -->
    <div id="card-container">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="card-content">
                    <div class="coord" id="coord">0, 0</div>
                    <div class="label">NOWOS</div>
                </div>
            </div>
            <div class="card-face card-back">
                <div class="card-content">
                    <div class="coord">EDIT</div>
                    <div class="label">CARD BACK</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========================================
         SOCKET SYSTEM
         Empty containers for plug-in components
         ======================================== -->
    <div id="socket-profile" class="socket">
        <div class="socket-label">PROFILE</div>
    </div>

    <div id="socket-settings" class="socket">
        <div class="socket-label">SETTINGS</div>
    </div>

    <div id="socket-tools" class="socket">
        <div class="socket-label">TOOLS</div>
    </div>

    <div id="socket-flip" class="socket">
        <div class="socket-label">FLIP</div>
    </div>

    <!-- ========================================
         INFO PANEL
         ======================================== -->
    <div id="info">
        <div>Position: <span id="pos">0, 0</span> | Size: <span id="size">Small</span></div>
        <div>Arrow keys / Swipe to navigate | Space to flip</div>
    </div>

    <!-- ========================================
         FOUNDATION JAVASCRIPT
         Core navigation + socket system
         ======================================== -->
    <script>
        /* ========================================
           STATE MANAGEMENT
           ======================================== */
        let x = 0, y = 0;
        let isNavigating = false;
        let idleTimer = null;
        let touchStartX = 0, touchStartY = 0;

        /* Elements */
        const card = document.getElementById('card');
        const coord = document.getElementById('coord');
        const bgFar = document.getElementById('bg-far');
        const bgMid = document.getElementById('bg-mid');
        const bgNear = document.getElementById('bg-near');
        const posDisplay = document.getElementById('pos');
        const sizeDisplay = document.getElementById('size');

        /* ========================================
           CARD NAVIGATION SYSTEM
           ======================================== */

        function navigate(dx, dy) {
            if (isNavigating || card.classList.contains('flipped')) return;
            
            isNavigating = true;
            x += dx;
            y += dy;
            
            /* Determine slide direction */
            let slideOut, slideIn;
            if (dx > 0) { slideOut = 'slide-out-left'; slideIn = 'slide-in-right'; }
            else if (dx < 0) { slideOut = 'slide-out-right'; slideIn = 'slide-in-left'; }
            else if (dy > 0) { slideOut = 'slide-out-down'; slideIn = 'slide-in-up'; }
            else { slideOut = 'slide-out-up'; slideIn = 'slide-in-down'; }
            
            /* Multi-layer parallax */
            const farX = x * 8, farY = y * 8;
            const midX = x * 16, midY = y * 16;
            const nearX = x * 24, nearY = y * 24;
            
            bgFar.style.transform = `translate(${-farX}px, ${-farY}px) scale(1.05)`;
            bgMid.style.transform = `translate(${-midX}px, ${-midY}px)`;
            bgNear.style.transform = `translate(${-nearX}px, ${-nearY}px)`;
            
            /* Card transition */
            card.classList.add(slideOut);
            
            setTimeout(() => {
                coord.textContent = `${x}, ${y}`;
                posDisplay.textContent = `${x}, ${y}`;
                card.classList.remove(slideOut);
                card.classList.add(slideIn);
                
                setTimeout(() => {
                    card.classList.remove(slideIn);
                    isNavigating = false;
                    startIdleTimer();
                }, 400);
            }, 400);
        }

        /* Card flip */
        function flipCard() {
            card.classList.toggle('flipped');
            if (card.classList.contains('flipped')) {
                clearTimeout(idleTimer);
            } else {
                startIdleTimer();
            }
        }

        /* Auto-focus timer (optional - comment out to disable) */
        function startIdleTimer() {
            clearTimeout(idleTimer);
            card.classList.remove('focused');
            sizeDisplay.textContent = 'Small';
            
            /* Uncomment to enable auto-zoom after 15 seconds */
            // idleTimer = setTimeout(() => {
            //     if (!isNavigating && !card.classList.contains('flipped')) {
            //         card.classList.add('focused');
            //         sizeDisplay.textContent = 'Focused';
            //     }
            // }, 15000);
        }

        /* ========================================
           INPUT HANDLING
           ======================================== */

        /* Keyboard */
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') navigate(-1, 0);
            if (e.key === 'ArrowRight') navigate(1, 0);
            if (e.key === 'ArrowUp') navigate(0, -1);
            if (e.key === 'ArrowDown') navigate(0, 1);
            if (e.key === ' ') { e.preventDefault(); flipCard(); }
        });

        /* Touch */
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });

        document.addEventListener('touchend', (e) => {
            const deltaX = e.changedTouches[0].screenX - touchStartX;
            const deltaY = e.changedTouches[0].screenY - touchStartY;
            const minSwipe = 60;
            
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > minSwipe) {
                navigate(deltaX > 0 ? -1 : 1, 0);
            } else if (Math.abs(deltaY) > minSwipe) {
                navigate(0, deltaY > 0 ? -1 : 1);
            }
        });

        /* ========================================
           SOCKET DRAGGING SYSTEM
           ======================================== */

        document.querySelectorAll('.socket').forEach(socket => {
            let isDragging = false;
            let startX, startY;

            socket.addEventListener('mousedown', start);
            socket.addEventListener('touchstart', start);

            function start(e) {
                isDragging = true;
                const touch = e.touches ? e.touches[0] : e;
                startX = touch.clientX - socket.offsetLeft;
                startY = touch.clientY - socket.offsetTop;
                socket.style.cursor = 'grabbing';
            }

            document.addEventListener('mousemove', move);
            document.addEventListener('touchmove', move);

            function move(e) {
                if (!isDragging) return;
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                socket.style.left = (touch.clientX - startX) + 'px';
                socket.style.top = (touch.clientY - startY) + 'px';
            }

            document.addEventListener('mouseup', () => {
                isDragging = false;
                socket.style.cursor = 'move';
            });
            
            document.addEventListener('touchend', () => {
                isDragging = false;
            });
        });

        /* ========================================
           COMPONENT LOADER (for future use)
           Uncomment when ready to load components
           ======================================== */

        /*
        async function loadComponent(name, socketId) {
            try {
                const response = await fetch(`components/${name}.html`);
                const html = await response.text();
                const socket = document.getElementById(socketId);
                socket.innerHTML = html;
                socket.style.border = 'none';
                socket.style.background = 'transparent';
            } catch (err) {
                console.error(`Failed to load ${name}:`, err);
            }
        }

        // Example usage:
        // loadComponent('settings-panel', 'socket-settings');
        // loadComponent('wallet-pog', 'socket-profile');
        */

        /* Initialize */
        startIdleTimer();
    </script>
</body>
</html>
