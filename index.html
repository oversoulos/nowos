<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowos - Complete Foundation</title>


</head>
<body>
    <!-- BACKGROUND LAYERS -->
    <div class="bg-layer bg-far" id="bg-far"></div>
    <div class="bg-layer bg-mid" id="bg-mid"></div>
    <div class="bg-layer bg-near" id="bg-near"></div>

    <!-- CARD -->
    <div id="card-container">
        <div class="card" id="card">
            <!-- FRONT -->
            <div class="card-face card-front">
                <div class="card-content">
                    <div class="coord" id="coord">0, 0</div>
                    <div class="label">NOWOS</div>
                </div>
            </div>
            
            <!-- BACK -->
            <div class="card-face card-back">
                <div class="card-content">
                    <div class="coord">EDIT</div>
                    <div class="label">BACK</div>
                </div>
            </div>
        </div>
    </div>

    <!-- FLIP BUTTON -->
    <div id="flip-btn">🔄</div>

    <!-- INFO DISPLAY -->
    <div id="info">
        <div>Position: <span id="pos">0, 0</span></div>
        <div>Size: <span id="size">Small</span></div>
        <div>Arrow keys or swipe to navigate</div>
        <div>Space/🔄 to flip</div>
    </div>

    <script>
        // State
        let x = 0, y = 0;
        let isNavigating = false;
        let idleTimer = null;
        let touchStartX = 0, touchStartY = 0;

        // Elements
        const card = document.getElementById('card');
        const coord = document.getElementById('coord');
        const flipBtn = document.getElementById('flip-btn');
        const bgFar = document.getElementById('bg-far');
        const bgMid = document.getElementById('bg-mid');
        const bgNear = document.getElementById('bg-near');
        const posDisplay = document.getElementById('pos');
        const sizeDisplay = document.getElementById('size');

        // Auto-focus after idle
        function startIdleTimer() {
            clearTimeout(idleTimer);
            card.classList.remove('focused');
            sizeDisplay.textContent = 'Small';
            
            idleTimer = setTimeout(() => {
                if (!isNavigating && !card.classList.contains('flipped')) {
                    card.classList.add('focused');
                    sizeDisplay.textContent = 'Focused';
                }
            }, 15000); // 15 seconds
        }

        // Navigate to new card
        function navigate(dx, dy) {
            if (isNavigating || card.classList.contains('flipped')) return;
            
            isNavigating = true;
            x += dx;
            y += dy;
            
            // Determine slide direction
            let slideOut, slideIn;
            if (dx > 0) {
                slideOut = 'slide-out-left';
                slideIn = 'slide-in-right';
            } else if (dx < 0) {
                slideOut = 'slide-out-right';
                slideIn = 'slide-in-left';
            } else if (dy > 0) {
                slideOut = 'slide-out-down';
                slideIn = 'slide-in-up';
            } else {
                slideOut = 'slide-out-up';
                slideIn = 'slide-in-down';
            }
            
            // Parallax background
            const farX = x * 8;
            const farY = y * 8;
            const midX = x * 16;
            const midY = y * 16;
            const nearX = x * 24;
            const nearY = y * 24;
            
            bgFar.style.transform = `translate(${-farX}px, ${-farY}px) scale(1.05)`;
            bgMid.style.transform = `translate(${-midX}px, ${-midY}px)`;
            bgNear.style.transform = `translate(${-nearX}px, ${-nearY}px)`;
            
            // Slide out current card
            card.classList.add(slideOut);
            
            setTimeout(() => {
                // Update content
                coord.textContent = `${x}, ${y}`;
                posDisplay.textContent = `${x}, ${y}`;
                
                // Remove slide-out, add slide-in
                card.classList.remove(slideOut);
                card.classList.add(slideIn);
                
                setTimeout(() => {
                    card.classList.remove(slideIn);
                    isNavigating = false;
                    startIdleTimer();
                }, 400);
            }, 400);
        }

        // Flip card
        function flipCard() {
            card.classList.toggle('flipped');
            if (card.classList.contains('flipped')) {
                card.classList.add('focused');
                sizeDisplay.textContent = 'Focused (Flipped)';
                clearTimeout(idleTimer);
            } else {
                startIdleTimer();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') navigate(-1, 0);
            if (e.key === 'ArrowRight') navigate(1, 0);
            if (e.key === 'ArrowUp') navigate(0, -1);
            if (e.key === 'ArrowDown') navigate(0, 1);
            if (e.key === ' ') {
                e.preventDefault();
                flipCard();
            }
        });

        // Touch navigation
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });

        document.addEventListener('touchend', (e) => {
            const deltaX = e.changedTouches[0].screenX - touchStartX;
            const deltaY = e.changedTouches[0].screenY - touchStartY;
            const minSwipe = 60;
            
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > minSwipe) {
                navigate(deltaX > 0 ? -1 : 1, 0);
            } else if (Math.abs(deltaY) > minSwipe) {
                navigate(0, deltaY > 0 ? -1 : 1);
            }
        });

        // Flip button
        flipBtn.addEventListener('click', flipCard);

        // Initialize
        startIdleTimer();
    </script>
</body>
</html>
