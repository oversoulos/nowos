<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="foundation.css">
    <title>Nowos</title>
    <style>

 

    </style>
</head>
    <script src="foundation.js"></script>
<body>

    <canvas id="star-canvas"></canvas>

    <div class="bg" id="bg-planet"></div>
    <canvas id="terrain-canvas"></canvas>
    <div class="bg" id="bg-haze"></div>

    <div id="sky"></div>
    <div id="star"></div>
    <div id="light-shadow"></div>

    <div id="card-container">
        <!-- zoom-wrap is the zoom layer — card slides happen inside it -->
        <div id="zoom-wrap" class="zoomed">
            <div class="card" id="card">

                <div class="card-face card-front">
                    <div class="card-skin"></div>
                    <div class="card-glass"></div>
                    <div class="card-shine" id="card-shine"></div>
                    <div class="card-content">
                        <div class="card-coord" id="coord">0, 0</div>
                        <div class="card-label">NOWOS</div>
                    </div>
                    <div class="card-node" id="card-node">NODE · 0000</div>
                </div>

                <div class="card-face card-back">
                    <div class="card-glass"></div>
                    <div class="card-content">
                        <div class="card-coord" style="font-size:15px;letter-spacing:2px;">CONFIGURE</div>
                        <div class="card-label" style="margin-top:10px;">Rules · Layout · Type</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="socket" id="s-profile"><div class="socket-icon">◉</div><div class="socket-lbl">Profile</div></div>
    <div class="socket" id="s-settings"><div class="socket-icon">⚙</div><div class="socket-lbl">Settings</div></div>
    <div class="socket" id="s-tools"><div class="socket-icon">⬡</div><div class="socket-lbl">Tools</div></div>
    <div class="socket" id="s-flip"><div class="socket-icon">↺</div><div class="socket-lbl">Flip</div></div>

        <div id="hud">POS <b id="hud-pos">0, 0</b></div>

    <script src="foundation.js"></script>

</body>
</html>
